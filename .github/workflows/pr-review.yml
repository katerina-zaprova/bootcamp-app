name: PR QA Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Write access is required to post the PR comment.
# Contents read is required to check out the branch.
permissions:
  contents: read
  pull-requests: write

jobs:
  qa-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          # Full history needed so git diff can reach the base branch
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Review changed files and post PR comment
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_BRANCH: ${{ github.base_ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Make the base branch available for diffing
          git fetch origin "$BASE_BRANCH"

          # List files changed relative to the merge base.
          # --diff-filter=d excludes deleted files — no content to review.
          mapfile -t changed < <(
            git diff --name-only --diff-filter=d "origin/${BASE_BRANCH}...HEAD"
          )

          if [[ ${#changed[@]} -eq 0 ]]; then
            echo "No reviewable files in this PR — skipping comment."
            exit 0
          fi

          echo "Reviewing ${#changed[@]} file(s):"
          printf '  %s\n' "${changed[@]}"

          bash scripts/batch-review.sh "${changed[@]}" > review.md

          gh pr comment "$PR_NUMBER" --body-file review.md
